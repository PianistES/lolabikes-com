[build]
  command = "echo 'Static site — blog pages pre-generated by GitHub Actions'"
  publish = "."

# ── TAAL-REDIRECTS ──────────────────────────────────────────────────────────
# Bezoekers zonder voorkeur → Spaans (root)
[[redirects]]
  from = "/"
  to   = "/index.html"
  status = 200
  conditions = {Language = ["es"]}

[[redirects]]
  from = "/"
  to   = "/nl/index.html"
  status = 302
  conditions = {Language = ["nl"]}

[[redirects]]
  from = "/"
  to   = "/en/index.html"
  status = 302
  conditions = {Language = ["en"]}

[[redirects]]
  from = "/"
  to   = "/fr/index.html"
  status = 302
  conditions = {Language = ["fr"]}

[[redirects]]
  from = "/"
  to   = "/de/index.html"
  status = 302
  conditions = {Language = ["de"]}

[[redirects]]
  from = "/"
  to   = "/it/index.html"
  status = 302
  conditions = {Language = ["it"]}

[[redirects]]
  from = "/"
  to   = "/ru/index.html"
  status = 302
  conditions = {Language = ["ru"]}

# ── BLOG INDEX REDIRECTS ─────────────────────────────────────────────────────
[[redirects]]
  from = "/blog"
  to   = "/blog/"
  status = 301

[[redirects]]
  from = "/nl/blog"
  to   = "/nl/blog/"
  status = 301

[[redirects]]
  from = "/en/blog"
  to   = "/en/blog/"
  status = 301

[[redirects]]
  from = "/fr/blog"
  to   = "/fr/blog/"
  status = 301

[[redirects]]
  from = "/de/blog"
  to   = "/de/blog/"
  status = 301

[[redirects]]
  from = "/it/blog"
  to   = "/it/blog/"
  status = 301

[[redirects]]
  from = "/ru/blog"
  to   = "/ru/blog/"
  status = 301

# ── SECURITY HEADERS ─────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/blog/**"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
