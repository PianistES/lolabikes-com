[build]
  command = "echo 'Static site — blog pages pre-generated by GitHub Actions'"
  publish = "."

[[redirects]]
  from = "/nl"
  to   = "/nl/"
  status = 301

[[redirects]]
  from = "/en"
  to   = "/en/"
  status = 301

[[redirects]]
  from = "/fr"
  to   = "/fr/"
  status = 301

[[redirects]]
  from = "/de"
  to   = "/de/"
  status = 301

[[redirects]]
  from = "/it"
  to   = "/it/"
  status = 301

[[redirects]]
  from = "/ru"
  to   = "/ru/"
  status = 301

[[redirects]]
  from = "/blog"
  to   = "/blog/"
  status = 301

[[redirects]]
  from = "/nl/blog"
  to   = "/nl/blog/"
  status = 301

[[redirects]]
  from = "/en/blog"
  to   = "/en/blog/"
  status = 301

[[redirects]]
  from = "/fr/blog"
  to   = "/fr/blog/"
  status = 301

[[redirects]]
  from = "/de/blog"
  to   = "/de/blog/"
  status = 301

[[redirects]]
  from = "/it/blog"
  to   = "/it/blog/"
  status = 301

[[redirects]]
  from = "/ru/blog"
  to   = "/ru/blog/"
  status = 301

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/blog/**"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"
